name: Planthopper Forecast

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

concurrency:
  group: planthopper-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: predictor/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r predictor/requirements.txt

      - name: Ensure vendored HYSPLIT executables are runnable
        run: chmod +x predictor/HYSPLIT/exec/*

      - name: Run forecast pipeline
        run: |
          python predictor/run_forecast.py run \
            --cycle-hour 12 \
            --download-count 5 \
            --forecast-days-before 3 \
            --forecast-days-after 9

      - name: Commit refreshed prediction data
        run: |
          if git diff --quiet -- prediction; then
            echo "No prediction changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prediction
          git commit -m "Update planthopper prediction data"
          git push